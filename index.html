<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise 🎂</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  overflow: hidden;
}

.container {
  max-width: 600px;
  padding: 20px;
  z-index: 2;
}

button {
  margin: 10px;
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #ff1e4d;
}

input {
  padding: 10px;
  border-radius: 6px;
  border: none;
}

.fade {
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(15px);}
  to {opacity: 1; transform: translateY(0);}
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1;
  pointer-events: none;
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<div class="container" id="app"></div>

<audio id="bgm" src="music.mp3" loop></audio>
<audio id="clickSound" src="click.mp3"></audio>

<script>
const app = document.getElementById("app");
const bgm = document.getElementById("bgm");
const clickSound = document.getElementById("clickSound");

let musicStarted = false;
let fireworksStarted = false;

// SOUND
function click() {
  try {
    clickSound.currentTime = 0;
    clickSound.play();
  } catch(e){}
}

function startMusic() {
  if (!musicStarted) {
    bgm.play().catch(()=>{});
    musicStarted = true;
  }
}

function go(fn) {
  click();
  startMusic();
  fn();
}

// RENDER
function show(html) {
  app.innerHTML = `<div class="fade">${html}</div>`;
}

// PART 1
function part1() {
  show(`
    <p>Wait… today feels illegal 🤨</p>
    <p>Someone just leveled up 👀</p>
    <p>Should I say it… or make you work for it?</p>
    <button onclick="go(part2)">Continue</button>
  `);
}

// PART 2
function part2() {
  show(`
    <button onclick="go(safe)">Click responsibly</button>
    <button onclick="go(danger)">Click dangerously 😈</button>
  `);
}

function safe() {
  show(`
    <p>Hmm… safe choice</p>
    <p>But today isn’t a safe day 😌</p>
    <button onclick="go(part3)">Continue</button>
  `);
}

function danger() {
  show(`
    <p>Ah yes… I expected this</p>
    <p>Chaos suits you.</p>
    <button onclick="go(part3)">Continue</button>
  `);
}

// PART 3
function part3() {
  show(`
    <p>You and your random mood switches😭</p>
    <p>Like one second normal…</p>
    <p>Next second — completely different person.</p>
    <p>And the award for…</p>
    <p>Professional overthinker goes to…</p>
    <button onclick="go(afterMahan)">mahan insaan</button>
  `);
}

function afterMahan() {
  show(`
    <p>Yes yes… we all know who that is 😌</p>
    <button onclick="go(part4)">Continue</button>
  `);
}

// PART 4
function part4() {
  show(`
    <p>From random conversations…</p>
    <p>To those unexpected talks…</p>
    <p>Somehow…</p>
    <p>You became important without permission.</p>
    <button onclick="go(part5)">Continue</button>
  `);
}

// PART 5 PASSWORD
function part5() {
  show(`
    <p>Wait…</p>
    <p>Before you go further…</p>
    <p>When was the <i>mahan insaan</i> born? 🎂</p>

    <input id="pass" placeholder="Enter date"><br><br>

    <button onclick="hint()">Hint</button>
    <button onclick="check()">Submit</button>

    <p id="hintText"></p>
    <p id="error" style="color:red;"></p>
  `);
}

function hint() {
  click();
  document.getElementById("hintText").innerText = "today 😌";
}

function check() {
  click();
  let val = document.getElementById("pass").value.trim().toLowerCase();

  if (val === "6 may" || val === "6may") {
    part6();
  } else {
    document.getElementById("error").innerText = "Wrong 😑 Try again…";
  }
}

// PART 6 CELEBRATION
function part6() {
  startFireworks();
  show(`
    <h1>🎉 HAPPY BIRTHDAY MAHAN INSAAN 🎂</h1>
    <p>You survived another year 😌</p>
    <p>Still chaotic… but we accept it.</p>
    <p>A little annoying? Yes.</p>
    <p>Important? Also yes.</p>
    <p>But seriously…</p>
    <p>I’m really glad you exist.</p>
    <button onclick="go(part7)">okay… one last thing?</button>
  `);
}

// PART 7
function part7() {
  show(`
    <p>You matter more than you realize.</p>
    <button onclick="go(end)">Go back</button>
  `);
}

// END
function end() {
  show(`
    <p>Too late now :)</p>
    <p>You’re stuck with me.</p>
  `);
}

// FIREWORKS
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let particles = [];

function startFireworks() {
  if (fireworksStarted) return;
  fireworksStarted = true;

  setInterval(() => {
    for (let i = 0; i < 120; i++) {
      particles.push({
        x: canvas.width / 2,
        y: canvas.height / 2,
        dx: (Math.random() - 0.5) * 9,
        dy: (Math.random() - 0.5) * 9,
        life: 100
      });
    }
  }, 700);
}

function animate() {
  requestAnimationFrame(animate);

  ctx.fillStyle = "rgba(0,0,0,0.15)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.dx;
    p.y += p.dy;
    p.life--;

    ctx.fillStyle = `hsl(${Math.random()*360},100%,60%)`;
    ctx.fillRect(p.x, p.y, 3, 3);

    if (p.life <= 0) particles.splice(i, 1);
  }
}

animate();

// START
part1();
</script>

</body>
</html>
