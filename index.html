<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>👀</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

.container {
  animation: fadeIn 0.8s ease;
}

h2 {
  font-size: 28px;
  text-shadow:
    0 0 10px #ff4d6d,
    0 0 20px #ff4d6d,
    0 0 40px #ff1e4d;
}

p {
  margin-top: 10px;
  font-size: 16px;
  opacity: 0.85;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div class="container">
  <h2>You’ve already seen it 😌</h2>
  <p>And now you’re stuck with the memory.</p>
</div>

</body>
</html>
